name: Security and regression checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-regression:
    name: PHP lint and isolated smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify PHP extensions
        run: php -r "foreach(['pdo_sqlite','fileinfo','mbstring','openssl'] as $extension){if(!extension_loaded($extension)){fwrite(STDERR,\"Missing $extension\\n\");exit(1);}}"
      - name: Lint PHP
        run: find app scripts tests public -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run isolated smoke suite
        env:
          APP_ENV: testing
          APP_URL: https://thc-li.com
          APP_KEY: github-actions-security-smoke-key-2026
          APP_SETUP_TOKEN: github-actions-setup-token-at-least-32-characters
          DB_PATH: storage/ci-security.sqlite
        run: php tests/smoke.php

  secrets:
    name: Secret history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.170.0
      - name: Scan PHP security rules
        run: semgrep scan --config p/security-audit --config p/owasp-top-ten --config .semgrep.yml --severity ERROR --error --metrics=off .

  filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan vulnerabilities, secrets and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
