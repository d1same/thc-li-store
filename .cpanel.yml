---
deployment:
  tasks:
    - export DEPLOYPATH=/home/CPANEL_USER/public_html/
    - /bin/cp -R public/. $DEPLOYPATH
    - /bin/mkdir -p /home/CPANEL_USER/dispensary-app
    - /bin/cp -R app /home/CPANEL_USER/dispensary-app/
    - /bin/cp -R database /home/CPANEL_USER/dispensary-app/
    - /bin/cp -R scripts /home/CPANEL_USER/dispensary-app/
    - /bin/cp .env.example /home/CPANEL_USER/dispensary-app/.env.example
